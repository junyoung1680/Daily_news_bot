name: Daily News Bot

on:
  schedule:
    # 한국 시간(KST) 오전 8시 30분에 실행 (UTC 기준 전날 23:30)
    # 8시 30분에 시작해서 수집하고 9시 정각에 슬랙을 쏘는 구조야.
    - cron: '30 23 * * *'
  workflow_dispatch: # 필요할 때 수동으로 돌릴 수 있는 버튼도 남겨두자.

# 💡 봇이 깃허브에 history.json 파일을 저장할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install google-generativeai feedparser requests

      - name: Run Python Script
        env:
          SLACK_URL: ${{ secrets.SLACK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      # 💡 요약했던 기사 목록(history.json)을 깃허브 창고에 영구 저장
      - name: Commit and push history
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add history.json
          git commit -m "Update news history (Auto)" || echo "No changes to commit"
          git push
